name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  detect-version-change:
    name: Detect Version Change
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_changed: ${{ steps.version.outputs.version_changed }}
      prerelease_tag: ${{ steps.version.outputs.prerelease_tag }}
      prerelease_name: ${{ steps.version.outputs.prerelease_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect app version change
        id: version
        shell: pwsh
        run: |
          $currentVersion = (Get-Content "src-tauri/tauri.conf.json" | ConvertFrom-Json).version
          $beforeSha = "${{ github.event.before }}"
          $zeroSha = "0000000000000000000000000000000000000000"
          $versionChanged = "true"

          if ($beforeSha -and $beforeSha -ne $zeroSha) {
            git cat-file -e "$beforeSha`:src-tauri/tauri.conf.json" 2>$null
            if ($LASTEXITCODE -eq 0) {
              $previousVersion = (git show "$beforeSha`:src-tauri/tauri.conf.json" | ConvertFrom-Json).version
              if ($previousVersion -eq $currentVersion) {
                $versionChanged = "false"
              }
            }
          }

          $prereleaseTag = "main-v$currentVersion-build-${{ github.run_number }}"
          $prereleaseName = "markdown-editor v$currentVersion prerelease (main build ${{ github.run_number }})"

          "version=$currentVersion" >> $env:GITHUB_OUTPUT
          "version_changed=$versionChanged" >> $env:GITHUB_OUTPUT
          "prerelease_tag=$prereleaseTag" >> $env:GITHUB_OUTPUT
          "prerelease_name=$prereleaseName" >> $env:GITHUB_OUTPUT

  main-prerelease:
    name: Build Main Prerelease
    needs: detect-version-change
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-version-change.outputs.version_changed == 'true'
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish prerelease
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.detect-version-change.outputs.prerelease_tag }}
          releaseName: ${{ needs.detect-version-change.outputs.prerelease_name }}
          releaseBody: |
            Automated prerelease build from the `main` branch.

            This prerelease is created only when the app version changes.

            - Version: `${{ needs.detect-version-change.outputs.version }}`
            - Commit: `${{ github.sha }}`
            - Branch: `main`
          releaseDraft: false
          prerelease: true

  tag-release:
    name: Build Tagged Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate tag matches app version
        id: tag
        shell: pwsh
        run: |
          $version = (Get-Content "src-tauri/tauri.conf.json" | ConvertFrom-Json).version
          $expectedTag = "v$version"
          $actualTag = "${{ github.ref_name }}"

          if ($actualTag -ne $expectedTag) {
            Write-Error "Tag '$actualTag' does not match app version '$expectedTag'."
            exit 1
          }

          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: markdown-editor ${{ github.ref_name }}
          releaseBody: |
            Official release build for `${{ github.ref_name }}`.

            - Version: `${{ steps.tag.outputs.version }}`
            - Commit: `${{ github.sha }}`
          releaseDraft: false
          prerelease: false
